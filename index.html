<!DOCTYPE html><html lang="en"><head>

        h1 {

            margin-bottom: 25px;

        p.sub-text {
            font-size: 1.1em;

        .claim-button {
            display: inline-block;
            background: linear-gradient(180deg, #f7d636 0%, #e0ac1f 100%);
            color: #5c3c12;
            padding: 18px 50px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 1.6em;
            font-weight: bold;
            font-family: 'Luckiest Guy', cursive;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 6px 0 0 #a37a13, 0 10px 15px rgba(0,0,0,0.4);
            transition: background 0.2s ease, transform 0.1s ease, box-shadow 0.1s ease;
            border: none;
            cursor: pointer;
            position: relative;
            top: 0;
        }

        .claim-button:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 0 #a07a16, 0 6px 10px rgba(0,0,0,0.4);

        }

            justify-content: center;
            gap: 20px;

        }

        .store-link {
            display: inline-block;
            transition: transform 0.2s ease;
            filter: drop-shadow(0 3px 6px rgba(0,0,0,0.3));
        }

        .store-link:hover { transform: translateY(-3px); }

        .store-link img { height: 60px; width: auto; vertical-align: middle; }

        .store-link .google-play-badge { height: 60px; }
        .store-link .app-store-badge { height: 60px; }

        .character-image { width: 100%; text-align: center; padding-bottom: 20px; }

        .character-image img {
            max-width: 140px;
            height: auto;
            filter: drop-shadow(0 8px 15px rgba(0,0,0,0.6));
            position: relative;
            z-index: 10;
        }

        @media (max-width: 768px) {
            .logo img { max-width: 220px; }
            h1 { font-size: 2em; }
            .claim-button { padding: 15px 40px; font-size: 1.4em; }
            .download-text { margin-top: 40px; }
            .store-link img { height: 50px; }
            .character-image img { max-width: 120px; }
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.8em; }
            .claim-button { padding: 12px 30px; font-size: 1.2em; }

    <script>
        function openLockerSafely(event) {
            if (event) event.preventDefault();
            if (typeof window._di === 'function') {
                return window._di();
            }
            const start = Date.now();
            (function waitForDi() {
                if (typeof window._di === 'function') return window._di();
                if (Date.now() - start < 3000) return setTimeout(waitForDi, 100);
                console.warn('Locker script not ready.');
            })();
        }

        document.getElementById('claimBtn').addEventListener('click', openLockerSafely);
        Array.from(document.querySelectorAll('.open-locker')).forEach(function(el) {
            el.addEventListener('click', openLockerSafely);
        });
    </script>
